  <script>
    // Trailer - clique para reproduzir
    const trailerContainer = document.getElementById('trailer');
    const trailerPreview = trailerContainer.querySelector('.trailer-preview');
    const playButton = trailerContainer.querySelector('.play-button');
    const VIDEO_ID = 'KtNl1vMHz24';

    function loadVideo() {
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${VIDEO_ID}?autoplay=1&rel=0&modestbranding=1`;
      iframe.title = 'Arcanith Trailer';
      iframe.frameBorder = '0';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      
      trailerPreview.style.display = 'none';
      playButton.style.display = 'none';
      trailerContainer.appendChild(iframe);
    }

    playButton.addEventListener('click', loadVideo);
    trailerPreview.addEventListener('click', loadVideo);

    // Modal para GIFs
    const modal = document.getElementById('gifModal');
    const modalImage = modal.querySelector('.modal-image');
    const modalClose = modal.querySelector('.modal-close');
    const modalPrev = modal.querySelector('.modal-prev');
    const modalNext = modal.querySelector('.modal-next');
    const gameplayItems = document.querySelectorAll('.gameplay-item');
    
    const gifSources = [
      'images/gameplay-1.png',
      'images/gameplay-2.png',
      'images/gameplay-3.png',
      'images/gameplay-4.png'
    ];
    
    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      modalImage.src = gifSources[currentIndex];
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + gifSources.length) % gifSources.length;
      modalImage.src = gifSources[currentIndex];
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % gifSources.length;
      modalImage.src = gifSources[currentIndex];
    }

    gameplayItems.forEach((item, index) => {
      item.addEventListener('click', () => openModal(index));
    });

    modalClose.addEventListener('click', closeModal);
    modalPrev.addEventListener('click', showPrev);
    modalNext.addEventListener('click', showNext);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (!modal.classList.contains('active')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') showPrev();
      if (e.key === 'ArrowRight') showNext();
    });
  </script>
